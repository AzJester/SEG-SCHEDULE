<text x="82" y="1252" font-size="11.5" fill="#46535F">The committed scale is being revised; the new values are still TBD (Melanie Lee).</text>
<circle cx="62" cy="1270" r="8.5" fill="#B5524A" stroke="#ffffff" stroke-width="1.4"/>
<text x="62" y="1273" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">4</text>
