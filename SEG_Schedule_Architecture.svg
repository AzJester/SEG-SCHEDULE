<text x="82" y="1154" font-size="12" font-weight="700" fill="#1E2A38">Group booking tables</text>
<text x="82" y="1172" font-size="11.5" fill="#46535F">Today: one row = one person · one task · one charge code. Wanted: list all charge codes with their % split in a single cell, so one row = one person · one task.</text>
