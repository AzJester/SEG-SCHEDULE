<text x="62" y="1193" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">2</text>
<text x="82" y="1194" font-size="12" font-weight="700" fill="#1E2A38">Validation + roster  →  Aggregate-Hours</text>
<text x="82" y="1212" font-size="11.5" fill="#46535F">Weekly hours vary by person. The hours view must scale by each person’s planned hours/week, not a flat 40 (a pain point in the original coding).</text>
<circle cx="62" cy="1230" r="8.5" fill="#B5524A" stroke="#ffffff" stroke-width="1.4"/>
<text x="62" y="1233" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">3</text>
