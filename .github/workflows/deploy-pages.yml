name: Deploy demo to GitHub Pages

# Builds the Vite app in app/ and publishes it to GitHub Pages.
# Requires: repo Settings → Pages → Source = "GitHub Actions" (one-time).

on:
  push:
    branches:
      - main
      - claude/repo-overview-jhmgq3
    paths:
      - 'app/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages (with the GitHub Actions source) on first run,
          # so no manual Settings → Pages step is needed.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
